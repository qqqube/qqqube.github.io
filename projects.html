<!DOCTYPE html>
<html>
	<head>
		<meta charset=utf-8>
		<title>Lauren Hong</title>
		<link rel="icon" href="images/icon.jpg" href="favicon.ico" />	
		<style>
			body { margin: 0;  }
			canvas { width: 100%; height: 100% }

			.line {
			position: relative;
			top: 50%;
			width: 24em;
			margin: 0 auto;
			border-right: 2px solid rgba(255, 255, 255, 0.75);
			font-size: 45px;
			font-family: courier;
			text-align: center;
			white-space: nowrap;
			overflow: hidden;
			transform: translateY(-50%);


		}
			.anim-typewriter {
			animation: typewriter 4s steps(40) 1s 1 normal both,
			blinkTextCursor 500ms steps(40) infinite normal;
		}






		@keyframes typewriter {
			from {
				width:0;
			}
			to {
				width: 16em;
			}
		}

		@keyframes blinkTextCursor {
			from {
				border-right-color: rgba(192,192,192,0.3);
			}
			to {
				border-right-color: transparent;
			}
		}

			.dropdown {
			  position: relative;
			  display: inline-block;
			}
			.dropdown-content {
			  display: none;
			  position: absolute;
			  background-color: #ffffff;
			  min-width: 160px;
			  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
			  z-index: 1;
			}
			.dropdown-content a {
			  color: black;
			  padding: 8px 16px 8px 8px;
			  text-decoration: none;
			  display: block;
			}

			.dropdown-content a:hover {background-color: #ddd;}

			.dropdown:hover .dropdown-content {display: block;}

			.dropdown:hover .dropbtn {background-color: #3e8e41;}

			p {
				text-align: center;
				font-family: courier;

			}

			.images {
				text-align:center;
			}



		
		</style>
		<div class="dropdown" style="float:right">

			<img border="0" src="images/styroCubes.gif" width="100" height="80">
			<div class="dropdown-content">
				<a href="index.html" style="font-family:courier">Home</a>
				<a href="aboutme.html" style="font-family:courier">About Me</a>
				<a href="education.html" style="font-family:courier">Education</a>
			</div>
		</div>
	</head>


    <body><br><br><br><br><br><br><br>
    	<p class="line anim-typewriter"> Projects</p><br><br><br><br><br>
    	<div class="images">
	    	<img src="images/proj1.png" width="900" height="550"><br>
	    	<img src="images/proj2.png" width="900" height="550"><br>
	    	<img src="images/proj3.png" width="900" height="490"><br>
	    	<img src="images/proj4.png" width="900" height="440"><br>
	    	<img src="images/proj5.png" width="900" height="460"><br>
	    	<img src="images/proj6.png" width="900" height="380"><br><br>
	    	<img src="images/proj7.png" width="900" height="350"><br>
	    </div>
	    	
 

	</body>
</html>
